<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix</title>
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
</head>
<body>
    <main>
      <button id="theme-toggle" class="theme-toggle" aria-label="Alternar modo claro/escuro">Modo claro</button>
    <header>
      <h1>Quem está assistindo?</h1>
    </header>

    <section aria-label="Perfis de usuário">
      <ul class="profiles">
<!----------------------------perfil 2---------------------------------->
        <a href="#" class="profile-link">
          <li class="profile">
              <figure>
                <img src="assets/adolecente.png" alt="Avatar adolescente">
              </figure>
          
            <figcaption>Giulia</figcaption>
          </li>
        </a>
<!----------------------------perfil 2---------------------------------->
        <a href="#" class="profile-link">
          <li class="profile">
              <figure>
              <img src="assets/menina.png" alt="Avatar menina">
              </figure>
          <figcaption>Fulana</figcaption>
          </li>
        </a>
<!----------------------------perfil 3---------------------------------->
        <a href="#" class="profile-link">
          <li class="profile">
              <figure>
                <img src="assets/homem.png" alt="Avatar menino">  
            </figure>
            <figcaption>Ciclano</figcaption>
        </li>
<!----------------------------perfil 4---------------------------------->
        <a href="#">
          <li class="profile">
            <figure>
                <img src="assets/urso.png" alt="Avatar urso">
            </figure>
            <figcaption>Kids</figcaption>
        </li>
        </a>
<!----------------------------perfil Novo---------------------------------->
        <a href="#">
          <li class="novo_usuario profile" aria-label="Adicionar novo perfil">
            <figure >
                <img src="assets/novo_usuario.png" alt="Avatar padrão">
            </figure>
            <figcaption>Adicionar novo</figcaption>
          </li>
        </a>


      </ul>
    </section>
    <a href="#"><input type="button" class="EditarPerfis" value="Editar perfil" aria-label="Gerenciar perfis"></a>
    </main>
</body>
</html>
